<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNISON - Web Synthesizer Suite</title>
    
    <!-- UNISON Shared Styles -->
    <link rel="stylesheet" href="shared/css/unison-base.css">
    <link rel="stylesheet" href="shared/css/unison-synths.css">
    
    <style>
        .description {
            color: #ccc;
            font-size: 0.75em;
            line-height: 1.5;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
    

</head>
<body>
    <div class="synth-container" style="width: 55%; margin: 0 auto;">
        <div class="title">UNISON</div>
        
        <div class="modules-container fm-layout">
            <div class="module" style="grid-column: span 3;">
                <div class="module-title">DESCRIPTION</div>
                <div class="description">
                    Introducing UNISON, a suite of web-based synthesizers
                </div>
            </div>
            <div class="module bottom-row-module" style="grid-column: span 3;">
                <div class="module-title">MONO</div>
                <div class="description">
                    Subtractive monophonic synthesizer
                </div>
                <a href="mono/index.html" target="_blank" class="patch-button" style="width: 100%; text-decoration: none;">UNISON MONO</a>
            </div>

            <div class="module bottom-row-module" style="grid-column: span 3;">
                <div class="module-title">FM</div>
                <div class="description">
                    Frequency modulation synthesizer
                </div>
                <a href="fm/index.html" target="_blank" class="patch-button" style="width: 100%; text-decoration: none;">UNISON FM</a>
            </div>

            <div class="module bottom-row-module" style="grid-column: span 3;">
                <div class="module-title">DRUM</div>
                <div class="description">
                    Drum and percussion synthesizer
                </div>
                <a href="drum/index.html" target="_blank" class="patch-button" style="width: 100%; text-decoration: none;">UNISON DRUM</a>
            </div>
        </div>
    </div>
</body>
</html>
