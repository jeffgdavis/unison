<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNISON METAL</title>
    
    <!-- Tone.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <!-- UNISON Shared Styles -->
    <link rel="stylesheet" href="../shared/css/unison-base.css?v=2">
    <link rel="stylesheet" href="../shared/css/unison-synths.css?v=2">
</head>
<body>
    <div class="synth-container">
        <div class="title">UNISON METAL</div>
        
        <!-- First Row: 2 columns -->
        <div class="modules-container metal-top-row">
            <!-- Envelope Module -->
            <div class="module">
                <div class="module-title">ENVELOPE</div>
                
                <div class="control">
                    <label for="attack">Attack <span id="attack-value" class="value-display">0.001</span></label>
                    <input type="range" id="attack" min="0.001" max="2" value="0.001" step="0.001">
                </div>
                
                <div class="control">
                    <label for="decay">Decay <span id="decay-value" class="value-display">1.50</span></label>
                    <input type="range" id="decay" min="0.1" max="5" value="1.5" step="0.01">
                </div>
                
                <div class="control">
                    <label for="sustain">Sustain <span id="sustain-value" class="value-display">0.00</span></label>
                    <input type="range" id="sustain" min="0" max="1" value="0" step="0.01">
                </div>
                
                <div class="control">
                    <label for="release">Release <span id="release-value" class="value-display">2.00</span></label>
                    <input type="range" id="release" min="0.1" max="5" value="2.0" step="0.01">
                </div>
            </div>
                        
            <!-- Tone Module -->
            <div class="module">
                <div class="module-title">TONE</div>
                
                <div class="control">
                    <label for="harmonicity">Harmonicity <span id="harmonicity-value" class="value-display">15.0</span></label>
                    <input type="range" id="harmonicity" min="0" max="100" value="15" step="0.1">
                </div>
                
                <div class="control">
                    <label for="modulationIndex">Modulation <span id="modulationIndex-value" class="value-display">32.0</span></label>
                    <input type="range" id="modulationIndex" min="0" max="100" value="32" step="0.1">
                </div>
                
                <div class="control">
                    <label for="octaves">Octaves <span id="octaves-value" class="value-display">1.5</span></label>
                    <input type="range" id="octaves" min="0" max="5" value="1.5" step="0.1">
                </div>
                
                <div class="control">
                    <label for="resonance">Resonance <span id="resonance-value" class="value-display">0.990</span></label>
                    <input type="range" id="resonance" min="0" max="1" value="0.99" step="0.001">
                </div>
            </div>
        </div>

        <!-- Second Row: 3 columns -->
        <div class="modules-container metal-bottom-row">
            <!-- Performance Module -->
            <div class="module">
                <div class="module-title">MASTER</div>
                
                <div class="control">
                    <label for="volume">Volume <span id="volume-value" class="value-display">70%</span></label>
                    <input type="range" id="volume" min="0" max="1" value="0.7" step="0.01">
                </div>
                
                <div class="control">
                    <label for="current-octave">Octave <span id="octave-display" class="value-display">4</span></label>
                    <input type="range" id="current-octave" min="1" max="7" value="4" step="1">
                </div>
            </div>

            <!-- Keyboard Module -->
            <div class="module">
                <div class="module-title">KEYBOARD</div>
                
                <div class="keyboard-container">
                    <div class="piano">
                        <div class="white-key" data-note="C"><span class="keyboard-mapping">A</span></div>
                        <div class="black-key" data-note="C#"><span class="keyboard-mapping">W</span></div>
                        <div class="white-key" data-note="D"><span class="keyboard-mapping">S</span></div>
                        <div class="black-key" data-note="D#"><span class="keyboard-mapping">E</span></div>
                        <div class="white-key" data-note="E"><span class="keyboard-mapping">D</span></div>
                        <div class="white-key" data-note="F"><span class="keyboard-mapping">F</span></div>
                        <div class="black-key" data-note="F#"><span class="keyboard-mapping">T</span></div>
                        <div class="white-key" data-note="G"><span class="keyboard-mapping">G</span></div>
                        <div class="black-key" data-note="G#"><span class="keyboard-mapping">Y</span></div>
                        <div class="white-key" data-note="A"><span class="keyboard-mapping">H</span></div>
                        <div class="black-key" data-note="A#"><span class="keyboard-mapping">U</span></div>
                        <div class="white-key" data-note="B"><span class="keyboard-mapping">J</span></div>
                    </div>
                </div>
            </div>

            <!-- Patch Module -->
            <div class="module">
                <div class="module-title">PATCH</div>
                
                <div class="patch-controls">
                    <button id="randomize" class="patch-button">Random</button>
                    <button id="save-patch" class="patch-button">Save</button>
                    <button id="load-patch" class="patch-button">Load</button>
                    <input type="file" id="load-input" accept=".json" class="hidden-file-input">
                </div>
                
                <div class="preset-section">
                    <div class="preset-label">PRESETS</div>
                    <div class="preset-grid" id="preset-buttons">
                        <!-- Preset buttons will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- UNISON Audio Library (Sound Engine) -->
    <script src="../shared/js/UnisonAudio.js"></script>
    
    <!-- UNISON UI Library (User Interface) -->
    <script src="../shared/js/UnisonUI.js"></script>
    
    <!-- Preset Data -->
    <script src="../shared/presets/metal-presets.js"></script>
    
    <!-- METAL-specific JavaScript -->
    <script src="js/MetalController.js"></script>
    
    <!-- Initialize METAL Synthesizer -->
    <script>
        // Robust initialization with mobile audio overlay support
        let initAttempts = 0;
        const maxAttempts = 50;
        
        function tryInitialize() {
            initAttempts++;
            
            // Check if all required components are loaded
            const metalReady = (typeof MetalController !== 'undefined' && 
                               typeof METAL_CONFIG !== 'undefined' &&
                               typeof METAL_AUDIO_CONFIG !== 'undefined' &&
                               typeof UnisonApp !== 'undefined' &&
                               typeof window.METAL_PRESETS !== 'undefined');
            
            if (metalReady) {
                initializeMetalSynth();
            } else if (initAttempts < maxAttempts) {
                setTimeout(tryInitialize, 100);
            } else {
                console.error('Failed to load required METAL components after 5 seconds');
            }
        }
        
        async function initializeMetalSynth() {
            try {
                const metalApp = new UnisonApp('metal', MetalController, METAL_CONFIG);
                
                // Custom initialization that handles suspended audio context on HTTPS
                console.log('Starting METAL initialization...');
                
                // Initialize mobile audio overlay first
                await metalApp.audioOverlay.initialize();
                console.log('Mobile audio overlay initialized');
                
                // Wait for audio to be enabled on mobile
                if (!metalApp.audioOverlay.isEnabled()) {
                    console.log('Waiting for mobile audio activation...');
                    await new Promise(resolve => {
                        window.addEventListener('audioEnabled', resolve, { once: true });
                    });
                }
                
                // Only start Tone.js if context is not suspended (avoid HTTPS hang)
                if (Tone.context.state !== 'suspended') {
                    await Tone.start();
                    console.log('Tone.js started (context was not suspended)');
                } else {
                    console.log('Audio context suspended - will start on user interaction');
                }

                // Create controller
                metalApp.controller = new MetalController();
                console.log('MetalController created');
                
                // Create patch manager
                metalApp.patchManager = new UnisonPatchManager(metalApp.controller, 'metal', {
                    updateUICallback: () => metalApp.updateUIFromPatch(),
                    randomizeFunction: METAL_CONFIG.randomizeFunction
                });
                console.log('PatchManager created');
                
                // Initialize keyboard
                if (METAL_CONFIG.hasKeyboard) {
                    UnisonKeyboard.initialize(metalApp.controller, null);
                    console.log('Keyboard initialized');
                }
                
                // Initialize UI components
                metalApp.initializeUI();
                console.log('UI initialized');
                
                // Setup presets and controls
                metalApp.setupPresetGrid();
                metalApp.setupGlobalControls();
                
                // Synth-specific initialization
                if (METAL_CONFIG.specificInit) {
                    METAL_CONFIG.specificInit.call(metalApp);
                }
                
                metalApp.patchManager.initializeUI();
                metalApp.updateUIFromPatch();
                console.log('Presets and controls setup complete');
                
                // Add desktop audio context handling
                metalApp.setupDesktopAudioHandling();
                console.log('Desktop audio handling setup');
                
                window.metalApp = metalApp;
                console.log('🎸 UNISON METAL synthesizer fully initialized');
                
                // Handle HTTPS audio context requirements
                if (window.location.protocol === 'https:') {
                    ['click', 'touchstart', 'keydown'].forEach(event => {
                        document.addEventListener(event, async () => {
                            if (Tone.context.state !== 'running') {
                                try {
                                    await Tone.start();
                                    console.log('Audio context started on user interaction');
                                } catch (e) {
                                    console.error('Failed to start audio context:', e);
                                }
                            }
                        }, { once: true });
                    });
                }
                
            } catch (error) {
                console.error('Error initializing UNISON METAL:', error);
            }
        }
        
        // Start trying to initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', tryInitialize);
        } else {
            tryInitialize();
        }
    </script>
</body>
</html>
